<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MCAFKBot PRO</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body {
    background: #0f172a;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px 16px;
    color: #e2e8f0;
  }
  .container { width: 100%; max-width: 480px }
  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 20px;
    color: #22c55e;
    letter-spacing: 2px;
  }
  .card {
    background: #1e293b;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid #334155;
  }
  label { font-size: 0.78rem; color: #94a3b8; margin-bottom: 4px; display: block }
  input {
    width: 100%;
    padding: 11px 14px;
    margin-bottom: 10px;
    border: 1px solid #334155;
    border-radius: 10px;
    background: #0f172a;
    color: #f1f5f9;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
  }
  input:focus { border-color: #22c55e }
  .row { display: flex; gap: 10px }
  .row input { margin-bottom: 10px }
  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 8px;
  }
  button:active { transform: scale(0.98) }
  .btn-start { background: #22c55e; color: #000 }
  .btn-stop  { background: #ef4444; color: #fff }
  .btn-start:hover { opacity: 0.88 }
  .btn-stop:hover  { opacity: 0.88 }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #0f172a;
    border-radius: 10px;
    margin-bottom: 16px;
    border: 1px solid #334155;
    font-size: 0.9rem;
  }
  .dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: #475569;
    flex-shrink: 0;
    transition: background 0.4s;
  }
  .dot.online  { background: #22c55e; box-shadow: 0 0 8px #22c55e }
  .dot.offline { background: #ef4444 }

  .log-box {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 14px;
    height: 260px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    color: #94a3b8;
    scroll-behavior: smooth;
  }
  .log-box p { margin-bottom: 4px; line-height: 1.4 }
  .log-box p.green { color: #22c55e }
  .log-box p.red   { color: #f87171 }
  .log-box p.yellow{ color: #fbbf24 }
  .log-title {
    font-size: 0.75rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>⛏ MCAFKBot PRO</h1>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="statusText">Bekleniyor</span>
  </div>

  <div class="card">
    <label>Yönetici Şifre</label>
    <input id="password" type="password" placeholder="••••••••">

    <label>Sunucu IP</label>
    <input id="host" placeholder="örn: play.sunucu.net">

    <div class="row">
      <div style="flex:1">
        <label>Port</label>
        <input id="port" value="25565">
      </div>
      <div style="flex:1">
        <label>Versiyon</label>
        <input id="version" value="1.21.1">
      </div>
    </div>

    <label>Bot Nick</label>
    <input id="username" value="LysBotAFK">

    <button class="btn-start" onclick="startBot()">▶ Botu Başlat</button>
    <button class="btn-stop"  onclick="stopBot()">■ Botu Durdur</button>
  </div>

  <div class="card">
    <div class="log-title">📋 Canlı Log</div>
    <div class="log-box" id="logBox"></div>
  </div>
</div>

<script>
const socket = io()

// Bağlanınca geçmiş logları al
socket.on('history', (lines) => {
  lines.forEach(l => addLog(l))
})

socket.on('log', (line) => addLog(line))

socket.on('status', (s) => {
  const dot = document.getElementById('dot')
  const txt = document.getElementById('statusText')
  if (s === 'online') {
    dot.className = 'dot online'
    txt.textContent = 'Bot Online'
  } else {
    dot.className = 'dot offline'
    txt.textContent = 'Bot Offline'
  }
})

function addLog(line) {
  const box = document.getElementById('logBox')
  const p = document.createElement('p')
  p.textContent = line
  if (line.includes('✅') || line.includes('Online')) p.className = 'green'
  else if (line.includes('❌') || line.includes('Kicked') || line.includes('Hata')) p.className = 'red'
  else if (line.includes('⚠️') || line.includes('bağlanıyor')) p.className = 'yellow'
  box.appendChild(p)
  box.scrollTop = box.scrollHeight
}

function getData() {
  return {
    password: document.getElementById('password').value,
    host:     document.getElementById('host').value,
    port:     document.getElementById('port').value,
    username: document.getElementById('username').value,
    version:  document.getElementById('version').value
  }
}

async function startBot() {
  const res = await fetch('/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(getData())
  }).then(r => r.json())
  if (!res.ok) addLog(`⚠️ ${res.msg || 'Başlatılamadı'}`)
}

async function stopBot() {
  await fetch('/stop', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: document.getElementById('password').value })
  })
}
</script>
</body>
</html>

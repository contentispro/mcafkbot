<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MCAFKBot PRO</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
padding:40px;
color:white;
}
.box{
width:430px;
background:#111827;
padding:25px;
border-radius:18px;
box-shadow:0 0 25px #000;
}
input{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}
button{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}
.green{background:#22c55e;}
.red{background:#ef4444;}
.status{
margin-top:15px;
padding:12px;
background:#1e293b;
border-radius:10px;
}
h1{
text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h1>MCAFKBot PRO</h1>

<input id="password" placeholder="Yönetici Şifre">
<input id="host" placeholder="Sunucu IP">
<input id="port" value="25565" placeholder="Port">
<input id="username" value="LysBotAFK" placeholder="Bot Nick">
<input id="version" value="1.21.8" placeholder="Versiyon">

<button class="green" onclick="startBot()">Botu Sunucuya At</button>
<button class="red" onclick="stopBot()">Botu Çıkar</button>

<div class="status" id="status">Durum: Bekleniyor</div>

</div>

<script>

const socket = io()

socket.on('status',(s)=>{
document.getElementById("status").innerHTML="Durum: "+s
})

function getData(){
return {
password: password.value,
host: host.value,
port: port.value,
username: username.value,
version: version.value
}
}

async function startBot(){

await fetch('/start',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(getData())
})

}

async function stopBot(){

await fetch('/stop',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
password: password.value
})
})

}

</script>
</body>
</html>
